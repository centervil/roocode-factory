quality_policy:
  levels:
    critical:
      definition: "システムの基本動作を損なう、重大なセキュリティ上の欠陥、または IDD プロトコルの重大な違反 (例: `main` ブランチへの直接的な破壊的変更)"
      action: "即時 Rejection。PM は修正が完了するまで他のタスクの割り当てを停止し、Post-mortem を実行する。"
    major:
      definition: "要件の一部欠落、コード規約からの著しい逸脱、または IDD プロトコルの無視 (例: 要件定義/設計なしでの実装開始)"
      action: "Rejection。修正後に Reviewer の再査読を必須とする。"
    minor:
      definition: "タイポ、命名の不適切、非効率なロジック"
      action: "Accept with Comments。次回のタスクで修正を予約する。"

  metrics:
    protocol_compliance:
      threshold: 1.0  # リリース候補フェーズでは 100% 遵守が必須
      monitored_points:
        - "Branch initialization before Task phase"
        - "Presence of approved requirements.md, design.md, tasks.md"
        - "Creation of development logs for each session"
        - "PR-based integration (no direct commits to main)"

  rejection_threshold:
    consecutive_failures: 3
    action_on_breach: "User へのエスカレーション。モードの instruction の見直しを提案。"
